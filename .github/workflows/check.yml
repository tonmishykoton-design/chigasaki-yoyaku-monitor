name: 茅ヶ崎市施設予約 空き状況チェック

on:
  schedule:
    # 日本時間 9:15 (サイトは9:00開館のため少し余裕を持たせる)
    - cron: 15 0 * * *
    # 日本時間 22:30 (サイトは23:00閉館のため少し早める)
    - cron: 30 13 * * *
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: 依存パッケージをインストール
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: 空き状況を確認
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
        run: python check_availability.py
